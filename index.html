
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Didact+Gothic&family=Noto+Serif+JP:wght@300;400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .w { font-family: 'Noto Serif JP', serif; background: var(--color-background-primary); color: var(--color-text-primary); max-width: 560px; margin: 0 auto; padding: 3rem 2rem 4rem; }
  .brand { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.4em; color: var(--color-text-tertiary); text-transform: uppercase; text-align: center; margin-bottom: 2.5rem; }
  .hero { text-align: center; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--color-text-primary); }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 400; line-height: 1.2; margin-bottom: 1rem; }
  .hero-sub { font-size: 11px; letter-spacing: 0.12em; color: var(--color-text-secondary); }
  .field { margin-bottom: 2rem; }
  .field-label { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--color-text-primary); display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem; }
  .field-label .opt { font-size: 9px; letter-spacing: 0.1em; color: var(--color-text-tertiary); text-transform: none; font-family: 'Noto Serif JP', serif; font-style: italic; }
  textarea { width: 100%; background: transparent; border: none; border-bottom: 0.5px solid var(--color-border-primary); border-radius: 0; padding: 0.5rem 0 0.75rem; font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 300; color: var(--color-text-primary); resize: none; line-height: 1.8; transition: border-color 0.2s; }
  textarea:focus { outline: none; border-bottom-color: var(--color-text-primary); }
  textarea::placeholder { color: var(--color-text-tertiary); font-size: 12px; }
  .count { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.1em; color: var(--color-text-tertiary); text-align: right; margin-top: 4px; }
  .submit-row { margin-top: 2.5rem; display: flex; justify-content: center; }
  .btn { font-family: 'Didact Gothic', sans-serif; font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--color-background-primary); background: var(--color-text-primary); border: none; padding: 0.9rem 3rem; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.75; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .err { font-size: 11px; color: var(--color-text-danger); text-align: center; margin-top: 1rem; display: none; letter-spacing: 0.05em; }
  .err.on { display: block; }
  .result { display: none; margin-top: 3rem; }
  .result.on { display: block; }
  .result-rule { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
  .result-rule::before, .result-rule::after { content: ''; flex: 1; height: 1px; background: var(--color-text-primary); }
  .result-rule span { font-family: 'Didact Gothic', sans-serif; font-size: 8px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--color-text-secondary); white-space: nowrap; }
  .scent-block { padding: 2rem 0; border-top: 0.5px solid var(--color-border-tertiary); border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.25rem; }
  .scent-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; line-height: 1.9; color: var(--color-text-primary); min-height: 2em; }
  .scent-foot { margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .char-n { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.2em; color: var(--color-text-tertiary); }
  .copy-btn { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--color-text-secondary); background: none; border: 0.5px solid var(--color-border-secondary); padding: 5px 14px; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { color: var(--color-text-primary); border-color: var(--color-border-primary); }
  .cta { padding: 1.5rem 0; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; justify-content: space-between; align-items: center; gap: 1.5rem; }
  .cta-desc { font-size: 12px; line-height: 1.7; color: var(--color-text-secondary); }
  .cta-desc strong { display: block; font-weight: 400; font-size: 13px; color: var(--color-text-primary); margin-bottom: 3px; }
  .cta-right { text-align: right; flex-shrink: 0; }
  .price { font-family: 'Cormorant Garamond', serif; font-size: 28px; }
  .price-note { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.2em; color: var(--color-text-tertiary); text-transform: uppercase; margin-top: 4px; }
  .dots { display: inline-flex; gap: 5px; align-items: center; vertical-align: middle; }
  .dots span { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.5; animation: dp 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dp { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 0.9; } }
  .key-notice { font-size: 11px; color: var(--color-text-danger); text-align: center; padding: 0.75rem; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 2rem; line-height: 1.6; }
</style>

<div class="w">
  <div class="brand">Fragrance Translation</div>
  <div class="hero">
    <div class="hero-title">あなたの熱量を、<br>香りに翻訳する。</div>
    <div class="hero-sub">推しへの言葉から、その人の「さわり」を生成します</div>
  </div>

  <div class="key-notice" id="key-notice">
    APIキーが未設定です。<br>
    コードの <code>YOUR_API_KEY</code> を実際のキーに書き換えてください。
  </div>

  <div class="field">
    <div class="field-label">Character <span class="opt">公式紹介・プロフィールをそのままコピペでOK</span></div>
    <textarea id="f-chara" rows="5" maxlength="500" placeholder="所属、性格、設定など。500字まで。"></textarea>
    <div class="count"><span id="c-chara">0</span> / 500</div>
  </div>
  <div class="field">
    <div class="field-label">Group / Origin <span class="opt">任意 — 寮・組織・出身地など</span></div>
    <textarea id="f-group" rows="2" maxlength="200" placeholder="例：厳格な規律の寮、海をモチーフにした組織など。200字まで。"></textarea>
    <div class="count"><span id="c-group">0</span> / 200</div>
  </div>
  <div class="field">
    <div class="field-label">Your Passion</div>
    <textarea id="f-passion" rows="5" maxlength="400" placeholder="このキャラのどこが好きですか？一番「香りにしたい」と思う部分を教えてください。400字まで。"></textarea>
    <div class="count"><span id="c-passion">0</span> / 400</div>
  </div>

  <div class="submit-row">
    <button class="btn" id="gen-btn" onclick="generate()">Translate</button>
  </div>
  <div class="err" id="err"></div>

  <div class="result" id="result">
    <div class="result-rule"><span>Preview</span></div>
    <div class="scent-block">
      <div class="scent-text" id="scent-text"></div>
      <div class="scent-foot">
        <span class="char-n" id="char-n"></span>
        <button class="copy-btn" onclick="copyText()">Copy</button>
      </div>
    </div>
    <div class="cta">
      <div class="cta-desc">
        <strong>全文テキストを受け取る</strong>
        香調プロファイル・情景描写（約400字）を納品します
      </div>
      <div class="cta-right">
        <div class="price">¥500</div>
        <div class="price-note">Full Text</div>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = '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';

if (API_KEY !== 'YOUR_API_KEY') {
  document.getElementById('key-notice').style.display = 'none';
}

const SYS = `あなたはキャラクター解釈を香りと文学に翻訳する専門家です。以下の情報を読み、キャラクターの香調プロファイルを導き出し、100文字以内の詩的な情景描写を生成してください。

【香調フレームワーク】
ベース8種（外/内・能動/受動・光/影）：
- 外×能×光＝真昼の太陽（柑橘・フレッシュ・熱）
- 外×能×影＝嵐の前（スパイス・スモーク・ダークムスク）
- 外×受×光＝木漏れ日（グリーン・ホワイトティー・ウッド）
- 外×受×影＝夕暮れ（アンバー・スモーキーフローラル・土）
- 内×能×光＝満月（シダー・クールムスク・バイオレットリーフ）
- 内×能×影＝深海（ダークローズ・ウード・墨）
- 内×受×光＝夜明け前（ロータス・ミルク・淡いグリーン）
- 内×受×影＝廃墟の薔薇（サンダルウッド・スモーク・枯れたフローラル）

修飾：タバコ・コーヒー・ウイスキー・バイオレットリーフ・ゲラニウム・ベチバー・ムスク・ロータスなど

【描写ルール】
- 香りの強度→距離感（軽い＝遠い・逆光／重い＝近い・直視できない）
- トップが強くすぐ消える→一瞬の振り返り・すれ違い
- ベースが長く残る→不在の残り香
- キャラ自体は登場させない（情景・痕跡・空気のみ）
- ユーザーの熱量から視点を読む（夢女子→あなたへ向けて／カプ厨→相手を想定）
- 五感すべて使う

【出力】100文字以内・体言止め・余韻を残す・キャラ名・作品名を含まない・テキストのみ`;

['chara','group','passion'].forEach(k => {
  const ta = document.getElementById('f-'+k);
  const ct = document.getElementById('c-'+k);
  ta.addEventListener('input', () => {
    ct.textContent = ta.value.length;
  });
});

async function generate() {
  if (API_KEY === 'YOUR_API_KEY') {
    const err = document.getElementById('err');
    err.textContent = 'APIキーが設定されていません。コードを編集してください。';
    err.classList.add('on');
    return;
  }
  const chara = document.getElementById('f-chara').value.trim();
  const passion = document.getElementById('f-passion').value.trim();
  const group = document.getElementById('f-group').value.trim();
  const err = document.getElementById('err');
  const btn = document.getElementById('gen-btn');
  err.classList.remove('on');
  if (!chara || !passion) {
    err.textContent = 'Character と Your Passion は必須です。';
    err.classList.add('on');
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
  const msg = `【キャラ情報】\n${chara}\n\n${group ? '【所属・集団】\n'+group+'\n\n' : ''}【あなたの熱量】\n${passion}`;
  try {
    const res = await fetch('/api/translate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: SYS,
        messages: [{ role: 'user', content: msg }]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').trim();
    if (!text) throw new Error();
    document.getElementById('scent-text').textContent = text;
    document.getElementById('char-n').textContent = text.length + ' 字';
    document.getElementById('result').classList.add('on');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch {
    err.textContent = 'エラーが発生しました。APIキーを確認してください。';
    err.classList.add('on');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Translate';
  }
}

function copyText() {
  const t = document.getElementById('scent-text').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = 'Copied';
    setTimeout(() => b.textContent = 'Copy', 1500);
  });
}
</script>
