<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scent Decoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Didact+Gothic&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #111; }
.w { font-family: 'Noto Serif JP', serif; max-width: 560px; margin: 0 auto; padding: 3rem 2rem 4rem; }
.brand { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.4em; color: #999; text-transform: uppercase; text-align: center; margin-bottom: 2.5rem; }
.hero { text-align: center; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid #111; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 400; line-height: 1.2; margin-bottom: 1rem; }
.hero-sub { font-size: 11px; letter-spacing: 0.12em; color: #666; }
.field { margin-bottom: 2rem; }
.field-label { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: #111; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.6rem; }
.field-label .opt { font-size: 9px; letter-spacing: 0.1em; color: #999; text-transform: none; font-family: 'Noto Serif JP', serif; font-style: italic; }
textarea { width: 100%; background: transparent; border: none; border-bottom: 0.5px solid #999; border-radius: 0; padding: 0.5rem 0 0.75rem; font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 300; color: #111; resize: none; line-height: 1.8; transition: border-color 0.2s; }
textarea:focus { outline: none; border-bottom-color: #111; }
textarea::placeholder { color: #bbb; font-size: 12px; }
.count { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.1em; color: #bbb; text-align: right; margin-top: 4px; }
.submit-row { margin-top: 2.5rem; display: flex; justify-content: center; }
.btn { font-family: 'Didact Gothic', sans-serif; font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: #fff; background: #111; border: none; padding: 0.9rem 3rem; cursor: pointer; transition: opacity 0.2s; }
.btn:hover { opacity: 0.75; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.err { font-size: 11px; color: #c00; text-align: center; margin-top: 1rem; display: none; letter-spacing: 0.05em; }
.err.on { display: block; }
.result { display: none; margin-top: 3rem; }
.result.on { display: block; }
.result-rule { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
.result-rule::before, .result-rule::after { content: ''; flex: 1; height: 1px; background: #111; }
.result-rule span { font-family: 'Didact Gothic', sans-serif; font-size: 8px; letter-spacing: 0.4em; text-transform: uppercase; color: #666; white-space: nowrap; }
.scent-block { padding: 2rem 0; border-top: 0.5px solid #ddd; border-bottom: 0.5px solid #ddd; margin-bottom: 1.25rem; }
.scent-text { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; line-height: 1.9; color: #111; min-height: 2em; }
.scent-foot { margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; }
.char-n { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.2em; color: #bbb; }
.copy-btn { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: #666; background: none; border: 0.5px solid #ccc; padding: 5px 14px; cursor: pointer; transition: all 0.15s; }
.copy-btn:hover { color: #111; border-color: #999; }
.cta { padding: 1.5rem 0; border-bottom: 0.5px solid #ddd; display: flex; justify-content: space-between; align-items: center; gap: 1.5rem; }
.cta-desc { font-size: 12px; line-height: 1.7; color: #666; }
.cta-desc strong { display: block; font-weight: 400; font-size: 13px; color: #111; margin-bottom: 3px; }
.cta-right { text-align: right; flex-shrink: 0; }
.price { font-family: 'Cormorant Garamond', serif; font-size: 28px; }
.price-note { font-family: 'Didact Gothic', sans-serif; font-size: 9px; letter-spacing: 0.2em; color: #bbb; text-transform: uppercase; margin-top: 4px; }
.dots { display: inline-flex; gap: 5px; align-items: center; vertical-align: middle; }
.dots span { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.5; animation: dp 1.2s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dp { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 0.9; } }
</style>
</head>
<body>
<div class="w">
  <div class="brand">Fragrance Translation</div>
  <div class="hero">
    <div class="hero-title">あなたの熱量を、<br>香りに翻訳する。</div>
    <div class="hero-sub">推しへの言葉から、その人の「さわり」を生成します</div>
  </div>
  <div class="field">
    <div class="field-label">Character <span class="opt">公式紹介・プロフィールをそのままコピペでOK</span></div>
    <textarea id="f-chara" rows="5" maxlength="500" placeholder="所属、性格、設定など。500字まで。"></textarea>
    <div class="count"><span id="c-chara">0</span> / 500</div>
  </div>
  <div class="field">
    <div class="field-label">Group / Origin <span class="opt">任意 — 寮・組織・出身地など</span></div>
    <textarea id="f-group" rows="2" maxlength="200" placeholder="例：厳格な規律の寮、海をモチーフにした組織など。200字まで。"></textarea>
    <div class="count"><span id="c-group">0</span> / 200</div>
  </div>
  <div class="field">
    <div class="field-label">Your Passion</div>
    <textarea id="f-passion" rows="5" maxlength="400" placeholder="このキャラのどこが好きですか？一番「香りにしたい」と思う部分を教えてください。400字まで。"></textarea>
    <div class="count"><span id="c-passion">0</span> / 400</div>
  </div>
  <div class="submit-row">
    <button class="btn" id="gen-btn" onclick="generate()">Translate</button>
  </div>
  <div class="err" id="err"></div>
  <div class="result" id="result">
    <div class="result-rule"><span>Preview</span></div>
    <div class="scent-block">
      <div class="scent-text" id="scent-text"></div>
      <div class="scent-foot">
        <span class="char-n" id="char-n"></span>
        <button class="copy-btn" onclick="copyText()">Copy</button>
      </div>
    </div>
    <div class="cta">
      <div class="cta-desc">
        <strong>全文テキストを受け取る</strong>
        香調プロファイル・情景描写（約400字）を納品します
      </div>
      <div class="cta-right">
        <div class="price">¥500</div>
        <div class="price-note">Full Text</div>
      </div>
    </div>
  </div>
</div>
<script>
['chara','group','passion'].forEach(k => {
  const ta = document.getElementById('f-'+k);
  const ct = document.getElementById('c-'+k);
  ta.addEventListener('input', () => { ct.textContent = ta.value.length; });
});

async function generate() {
  const chara = document.getElementById('f-chara').value.trim();
  const passion = document.getElementById('f-passion').value.trim();
  const group = document.getElementById('f-group').value.trim();
  const err = document.getElementById('err');
  const btn = document.getElementById('gen-btn');
  err.classList.remove('on');
  if (!chara || !passion) {
    err.textContent = 'Character と Your Passion は必須です。';
    err.classList.add('on');
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
  const msg = `【キャラ情報】\n${chara}\n\n${group ? '【所属・集団】\n'+group+'\n\n' : ''}【あなたの熱量】\n${passion}`;
  try {
    const res = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: msg }]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').trim();
    if (!text) throw new Error();
    document.getElementById('scent-text').textContent = text;
    document.getElementById('char-n').textContent = text.length + ' 字';
    document.getElementById('result').classList.add('on');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch {
    err.textContent = 'エラーが発生しました。しばらくしてからもう一度お試しください。';
    err.classList.add('on');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Translate';
  }
}

function copyText() {
  const t = document.getElementById('scent-text').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = 'Copied';
    setTimeout(() => b.textContent = 'Copy', 1500);
  });
}
</script>
</body>
</html>
